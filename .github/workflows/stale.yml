name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been inactive for 60 days and is now marked as stale.
            It will be closed in 14 days unless there is new activity.
            If this is still relevant, please leave a comment or remove the `stale` label.
          close-issue-message: >
            Closing due to inactivity. Please reopen if this is still relevant.
          exempt-issue-labels: 'pinned,security,epic,bug'

          # PRs
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: stale
          stale-pr-message: >
            This pull request has been inactive for 30 days and is now marked as stale.
            It will be closed in 14 days unless there is new activity.
          close-pr-message: >
            Closing due to inactivity. Please reopen if this is still relevant.
          exempt-pr-labels: 'pinned,security,do-not-merge'
