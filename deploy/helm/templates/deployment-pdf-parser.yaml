{{- if .Values.pdfParser.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "contextstream.fullname" . }}-pdf-parser
  labels:
    {{- include "contextstream.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-parser
spec:
  replicas: {{ .Values.pdfParser.replicaCount }}
  selector:
    matchLabels:
      {{- include "contextstream.pdfParserSelectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pdf-parser
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "contextstream.pdfParserSelectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pdf-parser
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "contextstream.serviceAccountName" . }}
      containers:
        - name: pdf-parser
          image: "{{ .Values.image.pdfParser.repository }}:{{ .Values.image.pdfParser.tag }}"
          imagePullPolicy: {{ .Values.image.pdfParser.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources.pdfParser | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      terminationGracePeriodSeconds: 30
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
