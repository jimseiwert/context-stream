apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "contextstream.fullname" . }}
  labels:
    {{- include "contextstream.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  DISPATCH_MODE: {{ .Values.config.dispatchMode | quote }}
  {{- if .Values.config.nextPublicAppUrl }}
  NEXT_PUBLIC_APP_URL: {{ .Values.config.nextPublicAppUrl | quote }}
  {{- end }}
  NEXT_PUBLIC_SAAS_MODE: {{ .Values.config.nextPublicSaasMode | quote }}
