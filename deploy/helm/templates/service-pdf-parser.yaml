{{- if .Values.pdfParser.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "contextstream.fullname" . }}-pdf-parser
  labels:
    {{- include "contextstream.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-parser
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    {{- include "contextstream.pdfParserSelectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-parser
{{- end }}
