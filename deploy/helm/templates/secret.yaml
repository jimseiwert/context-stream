apiVersion: v1
kind: Secret
metadata:
  name: {{ include "contextstream.fullname" . }}
  labels:
    {{- include "contextstream.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.databaseUrl }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.betterAuthSecret }}
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.githubClientId }}
  GITHUB_CLIENT_ID: {{ .Values.secrets.githubClientId | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.githubClientSecret }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.googleClientId }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.googleClientSecret }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.stripeSecretKey }}
  STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.stripeWebhookSecret }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.licenseKey }}
  LICENSE_KEY: {{ .Values.secrets.licenseKey | b64enc | quote }}
  {{- end }}
