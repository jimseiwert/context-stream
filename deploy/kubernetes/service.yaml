apiVersion: v1
kind: Service
metadata:
  name: contextstream-app
  namespace: default
  labels:
    app: contextstream-app
spec:
  selector:
    app: contextstream-app
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: contextstream-app-nodeport
  namespace: default
  labels:
    app: contextstream-app
spec:
  selector:
    app: contextstream-app
  type: NodePort
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
      protocol: TCP
