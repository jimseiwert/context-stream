apiVersion: v1
kind: Secret
metadata:
  name: contextstream-secrets
  namespace: default
type: Opaque
data:
  # All values must be base64-encoded.
  # Encode with: echo -n 'value' | base64
  DATABASE_URL: <base64-encoded-value>
  BETTER_AUTH_SECRET: <base64-encoded-value>
  OPENAI_API_KEY: <base64-encoded-value>
  AZURE_OPENAI_API_KEY: <base64-encoded-value>
  AZURE_OPENAI_ENDPOINT: <base64-encoded-value>
  AZURE_OPENAI_DEPLOYMENT: <base64-encoded-value>
  STRIPE_SECRET_KEY: <base64-encoded-value>
  STRIPE_WEBHOOK_SECRET: <base64-encoded-value>
  REDIS_URL: <base64-encoded-value>
